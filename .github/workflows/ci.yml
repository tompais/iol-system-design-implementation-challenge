name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Build, test, lint, and verify coverage
        run: ./gradlew build
      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/sd-implementation-challenge-*.jar

  k6:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs
      - name: Start application in background
        run: nohup java -jar build/libs/sd-implementation-challenge-*.jar > /tmp/app.log 2>&1 &
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkps://keyserver.ubuntu.com --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 5
          done
          echo "Application failed to start. Logs:"
          cat /tmp/app.log
          exit 1
      - name: Run k6 performance tests
        run: k6 run demo/rate-limiter-demo.js
