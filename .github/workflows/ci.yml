name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Build, test, lint, and verify coverage
        run: ./gradlew build
      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: |
            build/libs/sd-implementation-challenge-*.jar
            !build/libs/sd-implementation-challenge-*-plain.jar

  k6:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs
      - name: Start application in background
        run: |
          JAR=$(ls build/libs/sd-implementation-challenge-*.jar 2>/dev/null | grep -v -- '-plain\.jar' | head -1)
          if [ -z "$JAR" ]; then
            echo "No application JAR found in build/libs (excluding *-plain.jar)"
            ls -l build/libs || true
            exit 1
          fi
          # Refill rate is pinned to 1 token/sec for CI to make denial checks time-independent.
          # At this rate, all 10 sequential exhaustion requests would need to span >1 s to earn
          # an extra token — impossible on a localhost connection — so scenarios are deterministic.
          nohup java -jar "$JAR" --rate-limiter.refill-rate-per-second=1 > /tmp/app.log 2>&1 &
      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends k6
      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 5
          done
          echo "Application failed to start. Logs:"
          cat /tmp/app.log
          exit 1
      - name: Run k6 performance tests
        run: k6 run demo/rate-limiter-demo.js

  docker:
    needs: [build, k6]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tompais/iol-system-design-implementation-challenge:latest
            ghcr.io/tompais/iol-system-design-implementation-challenge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
