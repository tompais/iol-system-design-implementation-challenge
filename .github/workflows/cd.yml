name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@25ce8cbbcb08177468c7ff7ec5cbfa236f9341e1 # v1.1.0
        env:
          REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REPO_PATH
          script: |
            set -euo pipefail 2>/dev/null || set -e
            # REPO_PATH points to sd-implementation-challenge/ — where compose.yaml lives
            COMPOSE_DIR="${REPO_PATH%/}"
            case "$COMPOSE_DIR" in
              "~"|"~/"*)
                if [ -z "${HOME:-}" ]; then
                  echo "HOME must be set when using ~ in REPO_PATH" >&2; exit 1
                fi
                COMPOSE_DIR="${HOME}${COMPOSE_DIR#\~}"
                ;;
              "~"*)
                echo "~user paths are not supported in REPO_PATH" >&2; exit 1
                ;;
            esac
            case "$COMPOSE_DIR" in
              /*) ;;
              *) echo "REPO_PATH must resolve to an absolute path (got: '$COMPOSE_DIR')" >&2; exit 1 ;;
            esac
            # Git root is the PARENT of the compose directory
            REPO_DIR="$(dirname "$COMPOSE_DIR")"
            case "$REPO_DIR" in
              ""|"/"|"."|".."|"${HOME:-}"|"/home"|"/root")
                echo "Refusing to remove unsafe directory: '$REPO_DIR'" >&2; exit 1
                ;;
            esac
            if [ ! -d "$REPO_DIR/.git" ]; then
              rm -rf "$REPO_DIR"
              git clone https://github.com/tompais/iol-system-design-implementation-challenge.git "$REPO_DIR"
            fi
            cd "$COMPOSE_DIR"
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            docker compose up --build -d app
