name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

permissions:
  packages: read

# AWS manual setup (one-time, AWS Console):
#
# 1. Create an IAM user (e.g. "github-cd-deploy") with programmatic access only.
#    Attach an inline policy with a single statement:
#      Effect: Allow | Action: ec2:DescribeInstances | Resource: *
#    Generate an access key and store it in GitHub Secrets as
#    AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.
#
# 2. Add the following secrets to this GitHub repository
#    (Settings → Secrets and variables → Actions → New repository secret):
#      AWS_ACCESS_KEY_ID     – the IAM access key ID from step 1
#      AWS_SECRET_ACCESS_KEY – the IAM secret access key from step 1
#      AWS_REGION            – the AWS region where the EC2 lives (e.g. us-east-1)
#      EC2_INSTANCE_ID       – the EC2 instance ID (e.g. i-0123456789abcdef0);
#                              find it in EC2 → Instances → your instance → Instance ID.
#                              This value NEVER changes, even after stop/start.
#
# 3. The old EC2_HOST secret is no longer needed and can be deleted.

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Resolves the current public DNS of the EC2 instance at deploy time.
      # The instance ID never changes, so this always returns the correct host
      # even after a stop/start cycle that rotates the public IP and DNS.
      # The instance must be in the 'running' state — stopped instances return
      # an empty PublicDnsName, which causes an intentional deployment failure.
      - name: Resolve EC2 host
        id: ec2
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          HOST=$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicDnsName' \
            --output text)
          [ -n "$HOST" ] && [ "$HOST" != "None" ] || {
            echo "Failed to resolve public DNS for instance $EC2_INSTANCE_ID." \
                 "Verify the instance is running and AWS credentials have ec2:DescribeInstances" \
                 "permission in region $AWS_REGION." >&2
            exit 1
          }
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

      - name: Add EC2 host to known_hosts
        env:
          EC2_HOST: ${{ steps.ec2.outputs.host }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
          EC2_HOST: ${{ steps.ec2.outputs.host }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          chmod 600 "$KEY_FILE"
          printf '%s\n' "$EC2_SSH_KEY" > "$KEY_FILE"
          ssh -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes -o BatchMode=yes -i "$KEY_FILE" \
            "${EC2_USERNAME}@${EC2_HOST}" \
            "REPO_PATH=$(printf '%q' "$REPO_PATH") GITHUB_ACTOR=$(printf '%q' "$GITHUB_ACTOR") bash -s" << DEPLOY_SCRIPT
            set -euo pipefail 2>/dev/null || set -euo

            GHCR_TOKEN='${GHCR_TOKEN}'
            DEPLOY_SHA='${{ github.event.workflow_run.head_sha }}'

            # Versión pinneada de Compose para garantizar reproducibilidad y verificación de integridad.
            REQUIRED_COMPOSE="2.36.0"

            # Detecta la arquitectura para seleccionar el binario correcto (x86_64 o ARM64).
            ARCH=\$(uname -m)
            case "\$ARCH" in
              x86_64)  COMPOSE_ARCH="linux-x86_64" ;;
              aarch64) COMPOSE_ARCH="linux-aarch64" ;;
              *) echo "Arquitectura no soportada: \$ARCH" >&2; exit 1 ;;
            esac

            # Detecta el package manager (apt-get para Debian/Ubuntu, yum para Amazon Linux/RHEL).
            if command -v apt-get &>/dev/null; then
              PKG_UPDATE="sudo apt-get update"
              PKG_INSTALL="sudo apt-get install -y"
              DOCKER_PKG="docker.io"
            elif command -v yum &>/dev/null; then
              PKG_UPDATE="sudo yum update -y"
              PKG_INSTALL="sudo yum install -y"
              DOCKER_PKG="docker"
            else
              echo "No compatible package manager found (apt-get or yum)" >&2
              exit 1
            fi

            # Instala Docker si no está presente en el EC2.
            if ! command -v docker &>/dev/null; then
              \$PKG_UPDATE
              \$PKG_INSTALL \$DOCKER_PKG
              sudo usermod -aG docker "\$USER"
            fi

            # Asegura que el servicio de Docker esté arrancado y habilitado,
            # independientemente de si el binario fue recién instalado o ya existía.
            if ! sudo systemctl is-active --quiet docker; then
              sudo systemctl start docker
            fi
            if ! sudo systemctl is-enabled --quiet docker; then
              sudo systemctl enable docker
            fi

            # Instala el plugin de Docker Compose pinneado si no está disponible.
            if ! docker compose version &>/dev/null; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fSL "https://github.com/docker/compose/releases/download/v\${REQUIRED_COMPOSE}/docker-compose-\${COMPOSE_ARCH}" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              COMPOSE_SHA=\$(curl -fsSL "https://github.com/docker/compose/releases/download/v\${REQUIRED_COMPOSE}/docker-compose-\${COMPOSE_ARCH}.sha256" | awk '{print \$1}')
              [ -n "\$COMPOSE_SHA" ] || { echo "No se pudo obtener el checksum de Compose" >&2; exit 1; }
              echo "\$COMPOSE_SHA  /usr/local/lib/docker/cli-plugins/docker-compose" | sha256sum -c -
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Crea el directorio de trabajo y descarga el compose.yaml pinneado al SHA del deploy.
            # No se necesita clonar el repo: la imagen viene de ghcr.io y compose.yaml es el único
            # archivo necesario para orquestar el contenedor en el EC2.
            DEPLOY_DIR="\${REPO_PATH%/}"
            case "\$DEPLOY_DIR" in
              "~"|"~/"*)
                [ -n "\${HOME:-}" ] || { echo "HOME must be set when using ~ in REPO_PATH" >&2; exit 1; }
                DEPLOY_DIR="\${HOME}\${DEPLOY_DIR#\~}"
                ;;
              "~"*)
                echo "~user paths are not supported in REPO_PATH (got: '\$DEPLOY_DIR')" >&2; exit 1
                ;;
            esac
            case "\$DEPLOY_DIR" in
              /*) ;;
              *) echo "REPO_PATH must resolve to an absolute path (got: '\$DEPLOY_DIR')" >&2; exit 1 ;;
            esac
            mkdir -p "\$DEPLOY_DIR"
            curl -fsSL "https://raw.githubusercontent.com/tompais/iol-system-design-implementation-challenge/\${DEPLOY_SHA}/compose.yaml" \
              -o "\$DEPLOY_DIR/compose.yaml"
            echo "IMAGE_TAG=\${DEPLOY_SHA}" > "\$DEPLOY_DIR/.env"
            cd "\$DEPLOY_DIR"

            # Autentica en GHCR para hacer pull de la imagen pre-construida en CI.
            # <<< evita crear un subproceso que exponga el token en ps; trap garantiza el logout.
            sudo docker login ghcr.io -u "\$GITHUB_ACTOR" --password-stdin <<< "\$GHCR_TOKEN"
            trap 'sudo docker logout ghcr.io 2>/dev/null || true' EXIT

            # La imagen fue construida y publicada en ghcr.io por el job docker del CI.
            # Solo hace pull y levanta — sin rebuild en el EC2.
            sudo docker compose pull app
            sudo docker compose up -d --no-deps app
          DEPLOY_SCRIPT
