name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        env:
          REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              "${EC2_USERNAME}@${EC2_HOST}" << 'DEPLOY_SCRIPT'
            set -euo pipefail 2>/dev/null || set -euo

            # Versiones pinneadas para garantizar reproducibilidad y verificación de integridad.
            REQUIRED_COMPOSE="2.36.0"
            REQUIRED_BUILDX="0.17.0"

            # Detecta la arquitectura para seleccionar el binario correcto (x86_64 o ARM64).
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64)  COMPOSE_ARCH="linux-x86_64"; BUILDX_ARCH="linux-amd64" ;;
              aarch64) COMPOSE_ARCH="linux-aarch64"; BUILDX_ARCH="linux-arm64" ;;
              *) echo "Arquitectura no soportada: $ARCH" >&2; exit 1 ;;
            esac

            # Instala Docker y Git si cualquiera de los dos no está presente en el EC2.
            if ! command -v docker &>/dev/null || ! command -v git &>/dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io git
              sudo usermod -aG docker "$USER"
            fi

            # Asegura que el servicio de Docker esté arrancado y habilitado,
            # independientemente de si el binario fue recién instalado o ya existía.
            if ! sudo systemctl is-active --quiet docker; then
              sudo systemctl start docker
            fi
            if ! sudo systemctl is-enabled --quiet docker; then
              sudo systemctl enable docker
            fi

            # Instala el plugin de Docker Compose pinneado si no está disponible.
            if ! docker compose version &>/dev/null; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fSL "https://github.com/docker/compose/releases/download/v${REQUIRED_COMPOSE}/docker-compose-${COMPOSE_ARCH}" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              COMPOSE_SHA=$(curl -fsSL "https://github.com/docker/compose/releases/download/v${REQUIRED_COMPOSE}/docker-compose-${COMPOSE_ARCH}.sha256" | awk '{print $1}')
              [ -n "$COMPOSE_SHA" ] || { echo "No se pudo obtener el checksum de Compose" >&2; exit 1; }
              echo "$COMPOSE_SHA  /usr/local/lib/docker/cli-plugins/docker-compose" | sha256sum -c -
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Instala Docker Buildx >= 0.17.0 si la versión instalada es inferior o no existe.
            CURRENT_BUILDX=$(docker buildx version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "0.0.0")
            if [ "$(printf '%s\n' "$REQUIRED_BUILDX" "$CURRENT_BUILDX" | sort -V | head -1)" != "$REQUIRED_BUILDX" ]; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fSL "https://github.com/docker/buildx/releases/download/v${REQUIRED_BUILDX}/buildx-v${REQUIRED_BUILDX}.${BUILDX_ARCH}" \
                -o /usr/local/lib/docker/cli-plugins/docker-buildx
              BUILDX_SHA=$(curl -fsSL "https://github.com/docker/buildx/releases/download/v${REQUIRED_BUILDX}/checksums.txt" \
                | grep "buildx-v${REQUIRED_BUILDX}.${BUILDX_ARCH}$" | awk '{print $1}')
              [ -n "$BUILDX_SHA" ] || { echo "No se pudo obtener el checksum de Buildx" >&2; exit 1; }
              echo "$BUILDX_SHA  /usr/local/lib/docker/cli-plugins/docker-buildx" | sha256sum -c -
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
            fi

            CLONE_DIR="${REPO_PATH%/}"
            case "$CLONE_DIR" in
              "~"|"~/"*)
                if [ -z "${HOME:-}" ]; then
                  echo "HOME must be set when using ~ in REPO_PATH (got: '$CLONE_DIR')" >&2
                  exit 1
                fi
                CLONE_DIR="${HOME}${CLONE_DIR#\~}"
                ;;
              "~"*)
                echo "~user paths are not supported in REPO_PATH (got: '$CLONE_DIR')" >&2
                exit 1
                ;;
            esac
            case "$CLONE_DIR" in
              /*) ;;
              *) echo "REPO_PATH must resolve to an absolute path (got: '$CLONE_DIR')" >&2; exit 1 ;;
            esac
            if [ ! -d "$CLONE_DIR/.git" ]; then
              case "$CLONE_DIR" in
                ""|"/"|"."|".."|"${HOME:-}"|"/home"|"/root")
                  echo "Refusing to remove unsafe directory: '$CLONE_DIR'" >&2
                  exit 1
                  ;;
              esac
              rm -rf "$CLONE_DIR"
              git clone https://github.com/tompais/iol-system-design-implementation-challenge.git "$CLONE_DIR"
            fi
            cd "$CLONE_DIR"
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            sudo docker compose up --build -d app
            DEPLOY_SCRIPT
