name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@25ce8cbbcb08177468c7ff7ec5cbfa236f9341e1 # v1.1.0
        env:
          REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REPO_PATH
          script: |
            set -euo pipefail 2>/dev/null || set -euo

            # Asegura un entorno reproducible en EC2, eliminando la necesidad de
            # instalaciones manuales previas y garantizando versiones consistentes.

            # Instala Docker y Git si no están presentes en el EC2
            if ! command -v docker &>/dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io git
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker "$USER"
            fi

            # Instala el plugin de Docker Compose en la ruta estándar del sistema
            # si no está disponible, evitando depender de una instalación previa en EC2.
            if ! docker compose version &>/dev/null; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Instala Docker Buildx >= 0.17.0 si la versión instalada es inferior o no existe.
            REQUIRED_BUILDX="0.17.0"
            CURRENT_BUILDX=$(docker buildx version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "0.0.0")
            if [ "$(printf '%s\n' "$REQUIRED_BUILDX" "$CURRENT_BUILDX" | sort -V | head -1)" != "$REQUIRED_BUILDX" ]; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/buildx/releases/download/v${REQUIRED_BUILDX}/buildx-v${REQUIRED_BUILDX}.linux-amd64" \
                -o /usr/local/lib/docker/cli-plugins/docker-buildx
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
            fi

            CLONE_DIR="${REPO_PATH%/}"
            case "$CLONE_DIR" in
              "~"|"~/"*)
                if [ -z "${HOME:-}" ]; then
                  echo "HOME must be set when using ~ in REPO_PATH (got: '$CLONE_DIR')" >&2
                  exit 1
                fi
                CLONE_DIR="${HOME}${CLONE_DIR#\~}"
                ;;
              "~"*)
                echo "~user paths are not supported in REPO_PATH (got: '$CLONE_DIR')" >&2
                exit 1
                ;;
            esac
            case "$CLONE_DIR" in
              /*) ;;
              *) echo "REPO_PATH must resolve to an absolute path (got: '$CLONE_DIR')" >&2; exit 1 ;;
            esac
            if [ ! -d "$CLONE_DIR/.git" ]; then
              case "$CLONE_DIR" in
                ""|"/"|"."|".."|"${HOME:-}"|"/home"|"/root")
                  echo "Refusing to remove unsafe directory: '$CLONE_DIR'" >&2
                  exit 1
                  ;;
              esac
              rm -rf "$CLONE_DIR"
              git clone https://github.com/tompais/iol-system-design-implementation-challenge.git "$CLONE_DIR"
            fi
            cd "$CLONE_DIR"
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            docker compose up --build -d app
