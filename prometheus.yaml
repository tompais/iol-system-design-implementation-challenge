global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 10s

scrape_configs:
  - job_name: rate-limiter
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['app:8080']
    # Relabel to avoid duplicate job label
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: '.+'
        action: keep


