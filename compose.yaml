services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '9090:9090'
      - '4317:4317'
      - '4318:4318'
    networks:
      - observability

  app:
    build: .
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: rate-limiter
      # Micrometer's OTLP registry uses HTTP/protobuf; port 4317 is gRPC-only.
      # Override the URL it derives from OTEL_EXPORTER_OTLP_ENDPOINT to use port 4318.
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://grafana-lgtm:4317/v1/traces
    depends_on:
      - grafana-lgtm
    networks:
      - observability

networks:
  observability:
