services:
  # Prometheus: independent service that scrapes metrics from the app
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring

  # Grafana + LGTM stack (Loki, Tempo, OpenTelemetry Collector)
  # Provides dashboards and trace visualization
  grafana-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: grafana-lgtm
    restart: unless-stopped
    ports:
      - '3000:3000'    # Grafana UI
      - '4317:4317'    # OTLP gRPC receiver (traces)
      - '4318:4318'    # OTLP HTTP receiver
      - '9411:9411'    # Zipkin receiver (for Brave)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    networks:
      - monitoring

  # Rate Limiter Application
  app:
    build: .
    container_name: rate-limiter-app
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      OTEL_SERVICE_NAME: rate-limiter
      # Brave tracing: Docker service name resolves to container IP via Docker DNS
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://grafana-lgtm:9411/api/v2/spans"
    depends_on:
      prometheus:
        condition: service_started
      grafana-lgtm:
        condition: service_started
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  prometheus_data:
    driver: local

networks:
  monitoring:
    driver: bridge
