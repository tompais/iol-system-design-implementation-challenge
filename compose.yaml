services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '9090:9090'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability

  app:
    build: .
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      OTEL_SERVICE_NAME: rate-limiter
      # Traces are sent to Zipkin endpoint (port 9411) via Brave reporter
      # Metrics are exported via Prometheus Registry at /actuator/prometheus
      # Prometheus will scrape this endpoint via docker network
    depends_on:
      - grafana-lgtm
    networks:
      - observability

networks:
  observability:
