services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '9090:9090'
      - '4317'
      - '4318'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/rate-limiter
    environment:
      PROMETHEUS_ARGS: --config.file=/etc/prometheus/prometheus.yaml
    networks:
      - observability

  app:
    build: .
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: rate-limiter
      # Micrometer's OTLP registry uses HTTP/protobuf; port 4317 is gRPC-only.
      # Override the URL it derives from OTEL_EXPORTER_OTLP_ENDPOINT to use port 4318.
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
    depends_on:
      - grafana-lgtm
    networks:
      - observability

networks:
  observability:
