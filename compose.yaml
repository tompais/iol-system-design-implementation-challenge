services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '9090:9090'
      - '4317'
      - '4318'
    networks:
      - observability

  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: rate-limiter
    depends_on:
      - grafana-lgtm
    networks:
      - observability

networks:
  observability:
