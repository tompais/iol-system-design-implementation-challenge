Configuration:
  status: warn

  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} spanId=%X{spanId} - %msg%n"

  Loggers:
    Root:
      level: info
      AppenderRef:
        - ref: Console
    Logger:
      - name: com.iol
        level: debug
        additivity: false
        AppenderRef:
          - ref: Console
