spring:
  web:
    error:
      include-binding-errors: always
      include-message: always
      include-exception: true
  application:
    name: sd-implementation-challenge

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: WARN
    com.iol.ratelimiter: TRACE
    com.iol.sdimplementationchallenge: TRACE

rate-limiter:
  capacity: 10
  refill-rate-per-second: 5

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        step: 10s
  otlp:
    tracing:
      # Zipkin endpoint for distributed tracing (Brave reporter)
      endpoint: http://localhost:9411
