spring:
    application:
        name: rate-limiter
    web:
        error:
            include-message: always
            include-exception: true
            include-binding-errors: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: WARN
    com.iol.ratelimiter: TRACE
    com.iol.sdimplementationchallenge: TRACE

rate-limiter:
  capacity: 10
  refill-rate-per-second: 5

management:
    endpoints:
        web:
            exposure:
                include: health,metrics,info,prometheus,otlp
    endpoint:
        health:
            show-details: always
    metrics:
        enable:
            jvm: true
            process: true
            logback: true
    prometheus:
        metrics:
            export:
                step: 10s
                descriptions: true
    otlp:
        metrics:
            export:
                step: 10s
    tracing:
        sampling:
            probability: 1.0
    simple:
        metrics:
            export:
                enabled: true
