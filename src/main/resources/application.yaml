spring:
  web:
    error:
      include-binding-errors: always
      include-message: always
      include-exception: true
  application:
    name: sd-implementation-challenge

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: WARN
    com.iol.ratelimiter: TRACE
    com.iol.sdimplementationchallenge: TRACE

rate-limiter:
  capacity: 10
  refill-rate-per-second: 5

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        step: 10s
  # Disable OTLP metrics export (comes from spring-boot-starter-opentelemetry as transitive dependency)
  # We only use Prometheus Registry for metrics - this prevents "Connection refused" errors
  otlp:
    metrics:
      export:
        enabled: false
  # Brave tracing: send traces to Zipkin endpoint
  # Use 'grafana-lgtm' Docker service name (not localhost) - resolves via Docker network
  zipkin:
    tracing:
      endpoint: http://grafana-lgtm:9411/api/v2/spans
