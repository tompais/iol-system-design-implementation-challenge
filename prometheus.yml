# Prometheus configuration for rate-limiter service
# Scrapes metrics from the rate-limiter app at http://app:8080/actuator/prometheus

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'rate-limiter'
    static_configs:
      # 'app' is the Docker service name in compose.yaml
      - targets: ['app:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

